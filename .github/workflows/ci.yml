# =============================================================================
# CI — Repositorio Engine
# Archivo a colocar en: Tarffic-Simulator/Engine/.github/workflows/ci.yml
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Engine CI
    uses: Tarffic-Simulator/Workflow/.github/workflows/reusable-engine-ci.yml@main
    with:
      python-version: "3.12"
    secrets: inherit

  notify:
    name: Notify DevOps
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to Workflow repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEVOPS_DISPATCH_TOKEN }}
          repository: Tarffic-Simulator/Workflow
          event-type: engine-push
          client-payload: >
            {
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "status": "success"
            }
